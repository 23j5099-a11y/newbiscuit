<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NewBiscuit</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app">
      <section class="shelf" aria-label="部品置き場">
        <div class="brand">
          <span class="brand-mark"></span>
          <strong>NewBiscuit</strong>
        </div>
        <div id="parts" class="parts"></div>
      </section>

      <section class="stage-wrap" aria-label="ステージ">
        <div class="toolbar">
          <button id="toggleRun" class="primary" type="button">とめる</button>
          <button id="saveProject" type="button">保存</button>
          <button id="loadProject" type="button">読込</button>
          <button id="clearStage" type="button">ステージ消す</button>
          <button id="toggleLog" type="button">ログ</button>
          <span id="status" class="status">うごいています</span>
        </div>
        <div id="stage" class="stage drop-zone" data-zone="stage"></div>
        <aside id="logPanel" class="log-panel hidden" aria-label="ログ">
          <div class="log-head">
            <h2>ログ</h2>
            <button id="closeLog" type="button" aria-label="ログを閉じる">x</button>
          </div>
          <ul id="logList" class="log-list"></ul>
        </aside>
      </section>

      <section class="rule-wrap" aria-label="メガネ置き場">
        <div class="rule-head">
          <h1>メガネ</h1>
          <button id="addRule" type="button">ふやす</button>
        </div>
        <div id="rules" class="rules"></div>
      </section>
    </main>

    <template id="ruleTemplate">
      <article class="rule">
        <button class="delete-rule" type="button" aria-label="メガネを消す">x</button>
        <div class="lens drop-zone" data-zone="left">
          <span>まえ</span>
        </div>
        <div class="bridge"></div>
        <div class="lens drop-zone" data-zone="right">
          <span>あと</span>
        </div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
